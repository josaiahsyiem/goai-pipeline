services:
  postgres:
    image: postgis/postgis:15-3.3
    container_name: goai_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: goai_redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: goai_qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  api:
    build: ./app
    container_name: goai_api
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - POSTGRES_HOST=goai_postgres
      - REDIS_URL=redis://goai_redis:6379/0
      - QDRANT_HOST=goai_qdrant
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    command: uvicorn app:app --host 0.0.0.0 --port 8000
    volumes:
      - ./app:/app
      - /opt/nlgeo/data:/data
    working_dir: /app
    restart: unless-stopped

  worker:
    build: ./app
    container_name: goai_worker
    env_file: .env
    environment:
      - POSTGRES_HOST=goai_postgres
      - REDIS_URL=redis://goai_redis:6379/0
      - QDRANT_HOST=goai_qdrant
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A worker worker --loglevel=info
    volumes:
      - ./app:/app
      - /opt/nlgeo/data:/data
    working_dir: /app
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: goai_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-goai123}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped

volumes:
  postgres_data:
  qdrant_data:
  grafana_data:
